<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="images/chart-line-solid.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
</head>
<body>
    <div class="page-header">
        <h1 id="title"></h1>
    </div>
    <div class="page-content biography">
        <div class="personal-info">  
            <h3 id="personal-info-header"></h3>  
            <p><strong>Name: </strong> <span  id="name"></span></p>
            <p><strong>Age: </strong> <span  id="age"></span></p>
            <p><strong>Goal: </strong> <span  id="goal"></span></p>
            <p><strong>Game: </strong> <span  id="game"></span></p>
            <p><strong>Hobby: </strong> <span  id="hobby"></span></p>
            <p><strong>Dream: </strong> <span  id="dream"></span></p>
        </div>
        <div class="work-info">
            <h3 id="work-info-header"></h3>  
            <p><strong>Company: </strong> <span  id="company"></span></p>
            <p><strong>Postion: </strong> <span  id="position"></span></p>
            <p><strong>Date: </strong> <span  id="date"></span></p>
            <p><strong>Duration: </strong> <span  id="duration"></span></p>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
